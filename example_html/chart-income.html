<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - My Income 图表</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* My Income 图表特定样式 */
        .chart-income-wrapper {
            padding: 34px;
            padding-top: 20px;
        }

        .income-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .income-title {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        .income-info-icon {
            width: 18px;
            height: 18px;
            cursor: help;
        }

        .income-info-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-black);
            stroke-width: 2;
            fill: none;
        }

        /* 图表容器 */
        .income-chart-container {
            width: 250px;
            height: 174px;
            position: relative;
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-prompt);
            overflow: hidden;
        }

        #incomeChart {
            width: 100%;
            height: 100%;
        }

        /* 收入统计卡片 */
        .income-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-small);
        }

        .stat-label {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-grey-40);
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-black);
        }

        .stat-value.income {
            color: var(--color-green);
        }

        .stat-change {
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }

        .stat-change.positive {
            color: var(--color-green);
        }

        .stat-change.negative {
            color: var(--color-red);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chart-income-wrapper {
                padding: 16px;
            }

            .income-chart-container {
                width: 100%;
                height: 150px;
            }

            .stat-item {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="chart-income-wrapper">
        <!-- 标题区域 -->
        <div class="income-header">
            <h2 class="income-title">My Income</h2>
            <div class="income-info-icon" title="收入趋势分析">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="income-chart-container">
            <div id="incomeChart"></div>
        </div>

        <!-- 收入统计 -->
        <div class="income-stats">
            <div class="stat-item">
                <span class="stat-label">本月收入</span>
                <div>
                    <span class="stat-value income">$12,345.67</span>
                    <span class="stat-change positive">+15.3%</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-label">累计收入</span>
                <div>
                    <span class="stat-value">$98,765.43</span>
                    <span class="stat-change positive">+8.7%</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-label">预计收入</span>
                <div>
                    <span class="stat-value">$15,234.89</span>
                    <span class="stat-change negative">-2.1%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ECharts 初始化
        const chartDom = document.getElementById('incomeChart');
        const myChart = echarts.init(chartDom);

        // 静态数据（模拟收入数据）
        const chartData = {
            months: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            income: [8500, 9200, 10100, 9800, 11200, 12345],
            expenses: [6000, 6500, 7000, 6800, 7500, 8200]
        };

        // 图表配置
        const option = {
            grid: {
                left: 30,
                right: 10,
                top: 20,
                bottom: 20
            },
            xAxis: {
                type: 'category',
                data: chartData.months,
                axisLine: {
                    lineStyle: {
                        color: '#ECE9F1'
                    }
                },
                axisTick: {
                    show: false
                },
                axisLabel: {
                    color: '#A2A3A5',
                    fontSize: 10,
                    fontFamily: 'Poppins'
                }
            },
            yAxis: {
                type: 'value',
                axisLine: {
                    show: false
                },
                axisTick: {
                    show: false
                },
                axisLabel: {
                    show: false
                },
                splitLine: {
                    lineStyle: {
                        color: '#ECE9F1',
                        type: 'dashed'
                    }
                }
            },
            series: [
                {
                    name: '收入',
                    type: 'bar',
                    data: chartData.income,
                    barWidth: 12,
                    itemStyle: {
                        color: {
                            type: 'linear',
                            x: 0,
                            y: 0,
                            x2: 0,
                            y2: 1,
                            colorStops: [
                                { offset: 0, color: '#2BDE73' },
                                { offset: 1, color: 'rgba(43, 222, 115, 0.3)' }
                            ]
                        },
                        borderRadius: [6, 6, 0, 0]
                    }
                },
                {
                    name: '支出',
                    type: 'bar',
                    data: chartData.expenses,
                    barWidth: 12,
                    itemStyle: {
                        color: {
                            type: 'linear',
                            x: 0,
                            y: 0,
                            x2: 0,
                            y2: 1,
                            colorStops: [
                                { offset: 0, color: '#FF7977' },
                                { offset: 1, color: 'rgba(255, 121, 119, 0.3)' }
                            ]
                        },
                        borderRadius: [6, 6, 0, 0]
                    }
                }
            ]
        };

        myChart.setOption(option);

        // 响应式
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 图表点击事件
        myChart.on('click', function(params) {
            console.log('点击柱状图:', params.name, params.seriesName, '值:', params.value);
            alert(`${params.name} ${params.seriesName}: $${params.value.toLocaleString()}`);
        });

        // 图表悬停事件
        myChart.on('mouseover', function(params) {
            const profit = chartData.income[params.dataIndex] - chartData.expenses[params.dataIndex];
            console.log(`${params.name} 收入: $${chartData.income[params.dataIndex]}, 支出: $${chartData.expenses[params.dataIndex]}, 净利润: $${profit}`);
        });

        // 统计项交互
        document.querySelectorAll('.stat-item').forEach(item => {
            item.style.cursor = 'pointer';
            item.addEventListener('click', function() {
                const label = this.querySelector('.stat-label').textContent;
                const value = this.querySelector('.stat-value').textContent;
                alert(`${label}: ${value}`);
            });

            item.addEventListener('mouseenter', function() {
                this.style.transform = 'translateX(4px)';
                this.style.transition = 'transform 0.2s ease';
            });
            item.addEventListener('mouseleave', function() {
                this.style.transform = 'translateX(0)';
            });
        });

        // 增长百分比交互
        document.querySelectorAll('.stat-change').forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                const change = this.textContent;
                const isPositive = this.classList.contains('positive');
                const type = isPositive ? '增长' : '下降';
                alert(`相比上月${type}: ${change}`);
            });
        });
    </script>
</body>
</html>
