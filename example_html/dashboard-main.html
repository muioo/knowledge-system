<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BitForex.com</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* Dashboard 主页特定样式 */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: var(--bg-secondary);
        }

        .dashboard-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .dashboard-content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        /* 卡片区域 */
        .card-section {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-prompt);
            overflow: hidden;
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card-half {
            grid-column: span 2;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 80px;
            height: 100vh;
            background: var(--bg-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-spacer {
            width: 40px;
            height: 2px;
            background: linear-gradient(180deg, rgba(238, 236, 250, 0) 0%, rgba(249, 249, 249, 1) 51%, rgba(238, 236, 250, 0) 100%);
            margin: 10px 0;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            flex: 1;
        }

        .menu-item {
            width: 80px;
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .menu-item:hover {
            background: var(--bg-tertiary);
        }

        .menu-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon-wrapper.orange { background: rgba(247, 147, 26, 0.1); }
        .menu-icon-wrapper.blue { background: rgba(31, 141, 237, 0.1); }
        .menu-icon-wrapper.red { background: rgba(255, 121, 119, 0.1); }

        .menu-icon-wrapper svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .menu-icon-wrapper.orange svg { color: var(--color-orange); }
        .menu-icon-wrapper.blue svg { color: var(--color-blue); }
        .menu-icon-wrapper.red svg { color: var(--color-red); }

        .sidebar-footer {
            margin-top: auto;
        }

        /* 顶部导航栏 */
        .top-navbar {
            height: 82px;
            background: var(--bg-white);
            display: flex;
            align-items: center;
            padding: 0 35px;
            position: relative;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-item {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-grey-50);
            cursor: pointer;
            position: relative;
            padding: 10px 0;
        }

        .nav-item:hover { color: var(--text-black); }
        .nav-item.active { color: var(--text-black); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 2px;
            height: 40px;
            background: var(--color-indigo);
            border-radius: 1px;
        }

        .search-box {
            position: relative;
        }

        .search-box svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-black);
            stroke-width: 2;
            fill: none;
            cursor: pointer;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name-display {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        .navbar-divider {
            width: 100%;
            height: 2px;
            background: var(--text-black);
            position: absolute;
            bottom: 0;
            left: 0;
            border-radius: 2px;
        }

        /* 内容卡片 */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-default);
        }

        .card-title {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        .card-body {
            padding: 20px;
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            min-height: 300px;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .dashboard-content {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                justify-content: space-around;
                padding: 10px;
            }

            .menu-items {
                flex-direction: row;
            }

            .dashboard-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="12" fill="#7459D9"/>
                        <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="logo-spacer"></div>
            </div>

            <nav class="menu-items">
                <div class="menu-item active" title="Dashboard">
                    <div class="menu-icon-wrapper orange">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </div>
                </div>
                <div class="menu-item" title="Analytics">
                    <div class="menu-icon-wrapper blue">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 21H4.6c-.6 0-1.1-.4-1.2-1L2 7"/>
                            <path d="M16 3v13"/>
                            <path d="M11 8v8"/>
                            <path d="M6 12v4"/>
                        </svg>
                    </div>
                </div>
                <div class="menu-item" title="Notifications">
                    <div class="menu-icon-wrapper red">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div style="width:50px; height:50px; border-radius:10px; background:#7459D9; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">
                    BC
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="dashboard-main">
            <!-- 顶部导航栏 -->
            <header class="top-navbar">
                <div class="navbar-content">
                    <nav class="nav-menu">
                        <a class="nav-item active">Dashboard</a>
                        <a class="nav-item">Advanced Quarry</a>
                        <a class="nav-item">Events</a>
                    </nav>

                    <div class="user-section">
                        <div class="user-name-display">Bessie Cooper</div>
                    </div>
                </div>
                <div class="navbar-divider"></div>
            </header>

            <!-- 内容区域 -->
            <div class="dashboard-content">
                <!-- 面包屑 + 用户信息 -->
                <div class="card-section card-full" style="padding: 34px;">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                        <span style="font-family:'DINPro'; font-size:12px; font-weight:700; color:var(--text-white-4);">DASHBOARD</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-white-4)" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                        <span style="font-family:'DINPro'; font-size:12px; font-weight:500; color:var(--text-grey-50);">BITFOREX.COM</span>
                    </div>

                    <div style="display:flex; align-items:center; gap:20px;">
                        <div style="width:45px; height:45px; border-radius:15px; background:#7459D9; display:flex; align-items:center; justify-content:center;">
                            <span style="color:white; font-weight:bold;">BC</span>
                        </div>
                        <div>
                            <h1 style="font-family:'Yuanti SC'; font-size:26px; font-weight:700; color:var(--text-black);">wubin.design</h1>
                            <div style="display:inline-flex; align-items:center; gap:10px; padding:10px; background:var(--bg-tertiary); border-radius:20px; margin-top:10px;">
                                <span style="font-family:'Poppins'; font-size:14px; color:var(--text-white-4);">Social Trading Platform</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total visits 图表 -->
                <div class="card-section card-full">
                    <div class="card-header">
                        <h2 class="card-title">Total visits</h2>
                    </div>
                    <div class="card-body">
                        <div id="totalVisitsChart" style="width:100%; height:327px;"></div>
                    </div>
                </div>

                <!-- Perpetual 饼图 -->
                <div class="card-section">
                    <div class="card-header">
                        <h2 class="card-title">Perpetual</h2>
                    </div>
                    <div class="card-body">
                        <div id="perpetualPieChart" style="width:100%; height:200px;"></div>
                    </div>
                </div>

                <!-- Superiority 图表 -->
                <div class="card-section">
                    <div class="card-header">
                        <h2 class="card-title">Superiority</h2>
                    </div>
                    <div class="card-body">
                        <div id="superiorityChart" style="width:100%; height:156px;"></div>
                    </div>
                </div>

                <!-- My Income 图表 -->
                <div class="card-section">
                    <div class="card-header">
                        <h2 class="card-title">My Income</h2>
                    </div>
                    <div class="card-body">
                        <div id="incomeChart" style="width:100%; height:174px;"></div>
                    </div>
                </div>

                <!-- 社交平台列表 -->
                <div class="card-section card-full">
                    <div class="card-header">
                        <h2 class="card-title">社交平台</h2>
                    </div>
                    <div class="card-body">
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <div style="display:flex; align-items:center; gap:32px; padding:12px;">
                                <div style="width:48px; height:48px; border-radius:15px; background:linear-gradient(135deg, #4285F4, #34A853); display:flex; align-items:center; justify-content:center;">
                                    <span style="color:white; font-size:24px;">G</span>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <span style="font-family:'Poppins'; font-size:14px; color:var(--text-grey-50);">Stock trading</span>
                                    <span style="font-family:'Poppins'; font-size:14px; font-weight:600; color:var(--text-black);">Google</span>
                                </div>
                            </div>
                            <div style="height:1px; background:var(--border-default);"></div>
                            <div style="display:flex; align-items:center; gap:32px; padding:12px;">
                                <div style="width:48px; height:48px; border-radius:15px; background:var(--color-pink); display:flex; align-items:center; justify-content:center;">
                                    <span style="color:white; font-size:24px;">F</span>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <span style="font-family:'Poppins'; font-size:14px; color:var(--text-grey-50);">Stock trading</span>
                                    <span style="font-family:'Poppins'; font-size:14px; font-weight:600; color:var(--text-black);">Foursquare</span>
                                </div>
                            </div>
                            <div style="height:1px; background:var(--border-default);"></div>
                            <div style="display:flex; align-items:center; gap:32px; padding:12px;">
                                <div style="width:48px; height:48px; border-radius:15px; background:var(--color-green); display:flex; align-items:center; justify-content:center;">
                                    <span style="color:white; font-size:24px;">K</span>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:4px;">
                                    <span style="font-family:'Poppins'; font-size:14px; color:var(--text-grey-50);">Stock trading</span>
                                    <span style="font-family:'Poppins'; font-size:14px; font-weight:600; color:var(--text-black);">Kickstarter</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 初始化所有图表
        document.addEventListener('DOMContentLoaded', function() {
            // Total Visits 折线图
            const totalVisitsChart = echarts.init(document.getElementById('totalVisitsChart'));
            totalVisitsChart.setOption({
                grid: { left: 67, right: 48, top: 50, bottom: 22 },
                xAxis: {
                    type: 'category',
                    data: ['1', '5', '10', '15', '20', '25', '30'],
                    axisLine: { lineStyle: { color: '#ECE9F1', width: 4 } },
                    axisTick: { show: false },
                    axisLabel: { color: '#A2A3A5', fontSize: 14 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { show: false },
                    splitLine: { lineStyle: { color: '#ECE9F1', type: 'dashed' } }
                },
                series: [{
                    type: 'line',
                    data: [140, 180, 220, 260, 230, 190, 170],
                    smooth: true,
                    showSymbol: false,
                    lineStyle: { color: '#7459D9', width: 4 },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(116, 89, 217, 0.1)' },
                                { offset: 1, color: 'rgba(255, 255, 255, 0)' }
                            ]
                        }
                    }
                }]
            });

            // Perpetual 饼图
            const perpetualPieChart = echarts.init(document.getElementById('perpetualPieChart'));
            perpetualPieChart.setOption({
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    label: { show: false },
                    data: [
                        { value: 3124213, itemStyle: { color: '#7459D9' } },
                        { value: 1523151, itemStyle: { color: 'rgba(116, 89, 217, 0.5)' } },
                        { value: 948213, itemStyle: { color: 'rgba(116, 89, 217, 0.2)' } }
                    ]
                }]
            });

            // Superiority 柱状图
            const superiorityChart = echarts.init(document.getElementById('superiorityChart'));
            superiorityChart.setOption({
                grid: { left: 10, right: 10, top: 10, bottom: 20 },
                xAxis: { type: 'category', show: false },
                yAxis: { type: 'value', show: false },
                series: [{
                    type: 'bar',
                    data: [65, 78, 82, 90, 95, 105],
                    barWidth: 20,
                    itemStyle: {
                        color: '#7459D9',
                        borderRadius: [10, 10, 0, 0]
                    }
                }]
            });

            // My Income 图表
            const incomeChart = echarts.init(document.getElementById('incomeChart'));
            incomeChart.setOption({
                grid: { left: 30, right: 10, top: 20, bottom: 20 },
                xAxis: {
                    type: 'category',
                    data: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    axisLine: { lineStyle: { color: '#ECE9F1' } },
                    axisTick: { show: false },
                    axisLabel: { color: '#A2A3A5', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    show: false,
                    splitLine: { lineStyle: { color: '#ECE9F1', type: 'dashed' } }
                },
                series: [{
                    type: 'bar',
                    data: [8500, 9200, 10100, 9800, 11200, 12345],
                    barWidth: 12,
                    itemStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: '#2BDE73' },
                                { offset: 1, color: 'rgba(43, 222, 115, 0.3)' }
                            ]
                        },
                        borderRadius: [6, 6, 0, 0]
                    }
                }]
            });

            // 响应式
            window.addEventListener('resize', function() {
                totalVisitsChart.resize();
                perpetualPieChart.resize();
                superiorityChart.resize();
                incomeChart.resize();
            });

            // 导航菜单交互
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // 侧边栏菜单交互
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
