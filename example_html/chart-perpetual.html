<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perpetual 饼图</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* Perpetual 饼图特定样式 */
        .chart-perpetual-wrapper {
            padding: 34px;
            padding-top: 20px;
        }

        .perpetual-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .perpetual-title-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .perpetual-title {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        .perpetual-info-icon {
            width: 18px;
            height: 18px;
            cursor: help;
        }

        .perpetual-info-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-black);
            stroke-width: 2;
            fill: none;
        }

        .active-percentage-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .active-percentage-title {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        /* 内容区域 */
        .perpetual-content {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* 饼图容器 */
        .pie-chart-container {
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }

        #perpetualPieChart {
            width: 100%;
            height: 100%;
        }

        /* 图例区域 */
        .perpetual-legend {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .legend-icon {
            width: 30px;
            height: 22px;
            position: relative;
        }

        .legend-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-icon.google::before {
            background: var(--color-indigo);
        }

        .legend-icon.recommended::before {
            background: rgba(116, 89, 217, 0.5);
        }

        .legend-icon.other::before {
            background: rgba(116, 89, 217, 0.2);
        }

        .legend-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .legend-label {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-grey-50);
        }

        .legend-value {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-black);
        }

        /* 总计区域 */
        .total-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .total-value {
            font-family: 'Poppins', sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: var(--text-black);
        }

        .total-label {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-grey-50);
        }

        /* 在线/离线统计 */
        .status-stats {
            display: flex;
            gap: 50px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 30px;
            height: 22px;
            position: relative;
        }

        .status-dot::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .status-dot.online::before {
            background: rgba(116, 89, 217, 0.2);
        }

        .status-dot.offline::before {
            background: rgba(116, 89, 217, 0.5);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chart-perpetual-wrapper {
                padding: 16px;
            }

            .perpetual-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .perpetual-content {
                flex-direction: column;
                gap: 24px;
            }

            .pie-chart-container {
                width: 160px;
                height: 160px;
            }

            .status-stats {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="chart-perpetual-wrapper">
        <!-- 标题区域 -->
        <div class="perpetual-header">
            <div class="perpetual-title-section">
                <h2 class="perpetual-title">Perpetual</h2>
                <div class="perpetual-info-icon" title="用户来源统计">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </div>
            </div>

            <div class="active-percentage-section">
                <span class="active-percentage-title">Active Percentage</span>
                <div class="perpetual-info-icon" title="活跃用户占比">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="perpetual-content">
            <!-- 饼图 -->
            <div class="pie-chart-container">
                <div id="perpetualPieChart"></div>
            </div>

            <!-- 图例 -->
            <div class="perpetual-legend">
                <div class="legend-item">
                    <div class="legend-icon google"></div>
                    <div class="legend-content">
                        <span class="legend-label">Google.com .Inc</span>
                        <span class="legend-value">3,124,213 users</span>
                    </div>
                </div>

                <div class="total-section">
                    <span class="total-value">594</span>
                    <span class="total-label">Total</span>
                </div>

                <div class="legend-item">
                    <div class="legend-icon recommended"></div>
                    <div class="legend-content">
                        <span class="legend-label">Recommended flow</span>
                        <span class="legend-value">1,523,151 users</span>
                    </div>
                </div>

                <div class="legend-item">
                    <div class="legend-icon other"></div>
                    <div class="legend-content">
                        <span class="legend-label">Other</span>
                        <span class="legend-value">948,213 users</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 状态统计 -->
        <div class="status-stats" style="margin-top: 30px;">
            <div class="status-item">
                <div class="status-dot online"></div>
                <div class="legend-content">
                    <span class="legend-label">Online</span>
                    <span class="legend-value">179 users</span>
                </div>
            </div>

            <div class="status-item">
                <div class="status-dot offline"></div>
                <div class="legend-content">
                    <span class="legend-label">Offline</span>
                    <span class="legend-value">394 users</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ECharts 初始化
        const chartDom = document.getElementById('perpetualPieChart');
        const myChart = echarts.init(chartDom);

        // 静态数据（来自设计稿）
        const chartData = [
            { value: 3124213, name: 'Google.com .Inc', itemStyle: { color: '#7459D9' } },
            { value: 1523151, name: 'Recommended flow', itemStyle: { color: 'rgba(116, 89, 217, 0.5)' } },
            { value: 948213, name: 'Other', itemStyle: { color: 'rgba(116, 89, 217, 0.2)' } }
        ];

        // 图表配置
        const option = {
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                label: {
                    show: false
                },
                emphasis: {
                    label: {
                        show: false
                    }
                },
                labelLine: {
                    show: false
                },
                data: chartData
            }]
        };

        myChart.setOption(option);

        // 响应式
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 图例交互
        document.querySelectorAll('.legend-item').forEach((item, index) => {
            item.style.cursor = 'pointer';
            item.addEventListener('click', function() {
                // 高亮对应的扇形
                myChart.dispatchAction({
                    type: 'highlight',
                    seriesIndex: 0,
                    dataIndex: index
                });

                // 显示tooltip
                myChart.dispatchAction({
                    type: 'showTip',
                    seriesIndex: 0,
                    dataIndex: index
                });

                console.log('点击图例:', chartData[index].name);
            });

            item.addEventListener('mouseenter', function() {
                this.style.opacity = '0.8';
            });
            item.addEventListener('mouseleave', function() {
                this.style.opacity = '1';
                myChart.dispatchAction({
                    type: 'downplay',
                    seriesIndex: 0,
                    dataIndex: index
                });
            });
        });

        // 图表点击事件
        myChart.on('click', function(params) {
            console.log('点击扇形:', params.name, '用户数:', params.value);
        });

        // 图表悬停事件
        myChart.on('mouseover', function(params) {
            console.log('悬停:', params.name);
        });
    </script>
</body>
</html>
