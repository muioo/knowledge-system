<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Superiority 柱状图</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* Superiority 柱状图特定样式 */
        .chart-superiority-wrapper {
            padding: 34px;
            padding-top: 20px;
        }

        .superiority-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .superiority-title {
            font-family: 'DINPro', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        .superiority-info-icon {
            width: 18px;
            height: 18px;
            cursor: help;
        }

        .superiority-info-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-black);
            stroke-width: 2;
            fill: none;
        }

        /* 图表容器 */
        .superiority-chart-container {
            width: 250px;
            height: 156px;
            position: relative;
        }

        #superiorityChart {
            width: 100%;
            height: 100%;
        }

        /* 图表信息 */
        .superiority-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }

        .superiority-legend {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.primary {
            background: var(--color-indigo);
        }

        .legend-dot.secondary {
            background: rgba(116, 89, 217, 0.3);
        }

        .legend-text {
            font-family: 'Source Han Sans SC', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: var(--text-label);
        }

        .superiority-value {
            font-family: 'SF Pro Text', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: var(--color-indigo);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chart-superiority-wrapper {
                padding: 16px;
            }

            .superiority-chart-container {
                width: 200px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="chart-superiority-wrapper">
        <!-- 标题区域 -->
        <div class="superiority-header">
            <h2 class="superiority-title">Superiority</h2>
            <div class="superiority-info-icon" title="优势对比分析">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="superiority-chart-container">
            <div id="superiorityChart"></div>
        </div>

        <!-- 图表信息 -->
        <div class="superiority-info">
            <div class="superiority-legend">
                <div class="legend-dot primary"></div>
                <span class="legend-text">Legend</span>
            </div>
            <div class="superiority-value">+25%</div>
        </div>
    </div>

    <script>
        // ECharts 初始化
        const chartDom = document.getElementById('superiorityChart');
        const myChart = echarts.init(chartDom);

        // 静态数据（模拟设计稿中的数据）
        const chartData = {
            categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            values: [65, 78, 82, 90, 95, 105],
            baseline: [60, 60, 60, 60, 60, 60]
        };

        // 图表配置
        const option = {
            grid: {
                left: 10,
                right: 10,
                top: 10,
                bottom: 20
            },
            xAxis: {
                type: 'category',
                data: chartData.categories,
                axisLine: {
                    show: false
                },
                axisTick: {
                    show: false
                },
                axisLabel: {
                    show: false
                }
            },
            yAxis: {
                type: 'value',
                show: false
            },
            series: [
                {
                    name: 'Baseline',
                    type: 'bar',
                    data: chartData.baseline,
                    barWidth: 20,
                    itemStyle: {
                        color: 'rgba(116, 89, 217, 0.3)',
                        borderRadius: [10, 10, 0, 0]
                    },
                    label: {
                        show: false
                    }
                },
                {
                    name: 'Superiority',
                    type: 'bar',
                    data: chartData.values,
                    barWidth: 20,
                    itemStyle: {
                        color: '#7459D9',
                        borderRadius: [10, 10, 0, 0]
                    },
                    label: {
                        show: true,
                        position: 'top',
                        formatter: function(params) {
                            return params.value;
                        },
                        color: '#7459D9',
                        fontSize: 10,
                        fontFamily: 'SF Pro Text'
                    }
                }
            ]
        };

        myChart.setOption(option);

        // 响应式
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 图表点击事件
        myChart.on('click', function(params) {
            console.log('点击柱状图:', params.name, '值:', params.value);
            alert(`${params.name}: ${params.value}`);
        });

        // 图表悬停事件
        myChart.on('mouseover', function(params) {
            console.log('悬停:', params.name, params.seriesName);
        });

        // 图例交互
        const legendDot = document.querySelector('.legend-dot.primary');
        legendDot.style.cursor = 'pointer';
        legendDot.addEventListener('click', function() {
            myChart.dispatchAction({
                type: 'legendSelect',
                name: 'Superiority'
            });
        });

        const legendDotSecondary = document.querySelector('.legend-dot.secondary');
        legendDotSecondary.style.cursor = 'pointer';
        legendDotSecondary.addEventListener('click', function() {
            myChart.dispatchAction({
                type: 'legendSelect',
                name: 'Baseline'
            });
        });

        // 显示+25%增长
        const growthValue = document.querySelector('.superiority-value');
        growthValue.style.cursor = 'pointer';
        growthValue.addEventListener('click', function() {
            alert('相比上月增长25%');
        });
    </script>
</body>
</html>
