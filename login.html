<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Connect - Sign In</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ============================================================
       CSS Variables (Design Tokens)
       ============================================================ */

    :root {
      --background: 0 0% 100%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 222.2 84% 4.9%;
      --primary: 222.2 47.4% 11.2%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 222.2 84% 4.9%;
      --radius: 0.5rem;
    }

    .dark {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 4.9%;
      --card-foreground: 210 40% 98%;
      --popover: 222.2 84% 4.9%;
      --popover-foreground: 210 40% 98%;
      --primary: 210 40% 98%;
      --primary-foreground: 222.2 47.4% 11.2%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --accent: 217.2 32.6% 17.5%;
      --accent-foreground: 210 40% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 210 40% 98%;
      --border: 217.2 32.6% 17.5%;
      --input: 217.2 32.6% 17.5%;
      --ring: 212.7 26.8% 83.9%;
    }

    /* ============================================================
       Base Styles
       ============================================================ */

    * {
      border-color: hsl(var(--border));
      box-sizing: border-box;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { motion, AnimatePresence } = Motion;

    // ============================================================
    // Icon Components (Inline SVG)
    // ============================================================

    const EyeIcon = ({ className = "", size = 18 }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className}
      >
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    );

    const EyeOffIcon = ({ className = "", size = 18 }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className}
      >
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
        <line x1="2" x2="22" y1="2" y2="22" />
      </svg>
    );

    const ArrowRightIcon = ({ className = "", size = 24 }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className}
      >
        <path d="M5 12h14" />
        <path d="m12 5 7 7-7 7" />
      </svg>
    );

    // ============================================================
    // Utility Functions
    // ============================================================

    function cn(...classes) {
      return classes.filter(Boolean).join(' ');
    }

    // ============================================================
    // Button Component
    // ============================================================

    function Button({ children, variant = 'default', className = '', ...props }) {
      const baseStyles =
        'inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50';

      const variantStyles = {
        default:
          'bg-primary bg-gradient-to-r from-blue-500 to-indigo-600 text-white hover:from-blue-600 hover:to-indigo-700',
        outline:
          'border border-input bg-background hover:bg-accent hover:text-accent-foreground'
      };

      const combinedClassName = `${baseStyles} ${variantStyles[variant]} ${className}`;

      return (
        <button className={combinedClassName} {...props}>
          {children}
        </button>
      );
    }

    // ============================================================
    // Input Component
    // ============================================================

    function Input({ className = '', ...props }) {
      const baseStyles =
        'flex h-10 w-full rounded-md border bg-background px-3 py-2 text-sm text-gray-800 ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-gray-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50';

      const combinedClassName = `${baseStyles} ${className}`;

      return <input className={combinedClassName} {...props} />;
    }

    // ============================================================
    // DotMap Component
    // ============================================================

    function DotMap() {
      const canvasRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 0, height: 0 });

      const routes = [
        { start: { x: 100, y: 150, delay: 0 }, end: { x: 200, y: 80, delay: 2 }, color: '#2563eb' },
        { start: { x: 200, y: 80, delay: 2 }, end: { x: 260, y: 120, delay: 4 }, color: '#2563eb' },
        { start: { x: 50, y: 50, delay: 1 }, end: { x: 150, y: 180, delay: 3 }, color: '#2563eb' },
        { start: { x: 280, y: 60, delay: 0.5 }, end: { x: 180, y: 180, delay: 2.5 }, color: '#2563eb' }
      ];

      const generateDots = (width, height) => {
        const dots = [];
        const gap = 12;
        const dotRadius = 1;

        for (let x = 0; x < width; x += gap) {
          for (let y = 0; y < height; y += gap) {
            const isInMapShape =
              ((x < width * 0.25 && x > width * 0.05) && (y < height * 0.4 && y > height * 0.1)) ||
              ((x < width * 0.25 && x > width * 0.15) && (y < height * 0.8 && y > height * 0.4)) ||
              ((x < width * 0.45 && x > width * 0.3) && (y < height * 0.35 && y > height * 0.15)) ||
              ((x < width * 0.5 && x > width * 0.35) && (y < height * 0.65 && y > height * 0.35)) ||
              ((x < width * 0.7 && x > width * 0.45) && (y < height * 0.5 && y > height * 0.1)) ||
              ((x < width * 0.8 && x > width * 0.65) && (y < height * 0.8 && y > height * 0.6));

            if (isInMapShape && Math.random() > 0.3) {
              dots.push({ x, y, radius: dotRadius, opacity: Math.random() * 0.5 + 0.2 });
            }
          }
        }
        return dots;
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const resizeObserver = new ResizeObserver((entries) => {
          const { width, height } = entries[0].contentRect;
          setDimensions({ width, height });
          canvas.width = width;
          canvas.height = height;
        });

        resizeObserver.observe(canvas.parentElement);
        return () => resizeObserver.disconnect();
      }, []);

      useEffect(() => {
        if (!dimensions.width || !dimensions.height) return;

        const canvas = canvasRef.current;
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const dots = generateDots(dimensions.width, dimensions.height);
        let animationFrameId;
        let startTime = Date.now();

        function drawDots() {
          ctx.clearRect(0, 0, dimensions.width, dimensions.height);
          dots.forEach((dot) => {
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(37, 99, 235, ${dot.opacity})`;
            ctx.fill();
          });
        }

        function drawRoutes() {
          const currentTime = (Date.now() - startTime) / 1000;

          routes.forEach((route) => {
            const elapsed = currentTime - route.start.delay;
            if (elapsed <= 0) return;

            const duration = 3;
            const progress = Math.min(elapsed / duration, 1);

            const x = route.start.x + (route.end.x - route.start.x) * progress;
            const y = route.start.y + (route.end.y - route.start.y) * progress;

            ctx.beginPath();
            ctx.moveTo(route.start.x, route.start.y);
            ctx.lineTo(x, y);
            ctx.strokeStyle = route.color;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(route.start.x, route.start.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = route.color;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.4)';
            ctx.fill();

            if (progress === 1) {
              ctx.beginPath();
              ctx.arc(route.end.x, route.end.y, 3, 0, Math.PI * 2);
              ctx.fillStyle = route.color;
              ctx.fill();
            }
          });
        }

        function animate() {
          drawDots();
          drawRoutes();

          const currentTime = (Date.now() - startTime) / 1000;
          if (currentTime > 15) {
            startTime = Date.now();
          }

          animationFrameId = requestAnimationFrame(animate);
        }

        animate();

        return () => cancelAnimationFrame(animationFrameId);
      }, [dimensions]);

      return (
        <div className="relative w-full h-full overflow-hidden">
          <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" />
        </div>
      );
    }

    // ============================================================
    // SignInCard Component
    // ============================================================

    function SignInCard() {
      const [isPasswordVisible, setIsPasswordVisible] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isHovered, setIsHovered] = useState(false);

      const EyeIconComponent = isPasswordVisible ? EyeOffIcon : EyeIcon;

      const handleSubmit = (e) => {
        e.preventDefault();
        console.log('Sign in attempt with:', { email, password });
        alert('Sign in attempt with: ' + email);
      };

      const handleGoogleSignIn = () => {
        console.log('Google sign-in clicked');
        alert('Google sign-in clicked');
      };

      return (
        <div className="flex w-full h-full items-center justify-center">
          <motion.div
            initial={{ opacity: 0, scale: 0.95 }}
            animate={{ opacity: 1, scale: 1 }}
            transition={{ duration: 0.5 }}
            className="w-full max-w-4xl overflow-hidden rounded-2xl flex bg-white shadow-xl"
          >
            {/* Left side - Map */}
            <div className="hidden md:block w-1/2 h-[600px] relative overflow-hidden border-r border-gray-100">
              <div className="absolute inset-0 bg-gradient-to-br from-blue-50 to-indigo-100">
                <DotMap />

                {/* Logo and text overlay */}
                <div className="absolute inset-0 flex flex-col items-center justify-center p-8 z-10">
                  <motion.div
                    initial={{ opacity: 0, y: -20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 0.6, duration: 0.5 }}
                    className="mb-6"
                  >
                    <div className="h-12 w-12 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-200">
                      <ArrowRightIcon className="text-white h-6 w-6" />
                    </div>
                  </motion.div>
                  <motion.h2
                    initial={{ opacity: 0, y: -20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 0.7, duration: 0.5 }}
                    className="text-3xl font-bold mb-2 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600"
                  >
                    Travel Connect
                  </motion.h2>
                  <motion.p
                    initial={{ opacity: 0, y: -20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 0.8, duration: 0.5 }}
                    className="text-sm text-center text-gray-600 max-w-xs"
                  >
                    Sign in to access your global travel dashboard and connect with nomads worldwide
                  </motion.p>
                </div>
              </div>
            </div>

            {/* Right side - Sign In Form */}
            <div className="w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-center bg-white">
              <motion.div
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.5 }}
              >
                <h1 className="text-2xl md:text-3xl font-bold mb-1 text-gray-800">Welcome back</h1>
                <p className="text-gray-500 mb-8">Sign in to your account</p>

                {/* Google Sign In Button */}
                <div className="mb-6">
                  <button
                    className="w-full flex items-center justify-center gap-2 bg-gray-50 border border-gray-200 rounded-lg p-3 hover:bg-gray-100 transition-all duration-300 text-gray-700 shadow-sm"
                    onClick={handleGoogleSignIn}
                  >
                    <svg className="h-5 w-5" viewBox="0 0 24 24">
                      <path
                        fill="currentColor"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fillOpacity=".54"
                      />
                      <path
                        fill="#4285F4"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                      />
                      <path
                        fill="#34A853"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                      />
                      <path
                        fill="#FBBC05"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                      />
                      <path fill="#EA4335" d="M1 1h22v22H1z" fillOpacity="0" />
                    </svg>
                    <span>Login with Google</span>
                  </button>
                </div>

                {/* Divider */}
                <div className="relative my-6">
                  <div className="absolute inset-0 flex items-center">
                    <div className="w-full border-t border-gray-200"></div>
                  </div>
                  <div className="relative flex justify-center text-sm">
                    <span className="px-2 bg-white text-gray-500">or</span>
                  </div>
                </div>

                {/* Sign In Form */}
                <form className="space-y-5" onSubmit={handleSubmit}>
                  {/* Email Input */}
                  <div>
                    <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">
                      Email <span className="text-blue-500">*</span>
                    </label>
                    <Input
                      id="email"
                      type="email"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      placeholder="Enter your email address"
                      required
                      className="bg-gray-50 border-gray-200 placeholder:text-gray-400 text-gray-800 w-full focus:border-blue-500 focus:ring-blue-500"
                    />
                  </div>

                  {/* Password Input */}
                  <div>
                    <label htmlFor="password" className="block text-sm font-medium text-gray-700 mb-1">
                      Password <span className="text-blue-500">*</span>
                    </label>
                    <div className="relative">
                      <Input
                        id="password"
                        type={isPasswordVisible ? 'text' : 'password'}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        placeholder="Enter your password"
                        required
                        className="bg-gray-50 border-gray-200 placeholder:text-gray-400 text-gray-800 w-full pr-10 focus:border-blue-500 focus:ring-blue-500"
                      />
                      <button
                        type="button"
                        className="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700"
                        onClick={() => setIsPasswordVisible(!isPasswordVisible)}
                      >
                        <EyeIconComponent size={18} />
                      </button>
                    </div>
                  </div>

                  {/* Submit Button */}
                  <motion.div
                    whileHover={{ scale: 1.01 }}
                    whileTap={{ scale: 0.98 }}
                    onHoverStart={() => setIsHovered(true)}
                    onHoverEnd={() => setIsHovered(false)}
                    className="pt-2"
                  >
                    <Button
                      type="submit"
                      className={cn(
                        'w-full bg-gradient-to-r relative overflow-hidden from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white py-2 rounded-lg transition-all duration-300',
                        isHovered ? 'shadow-lg shadow-blue-200' : ''
                      )}
                    >
                      <span className="flex items-center justify-center">
                        Sign in
                        <ArrowRightIcon className="ml-2 h-4 w-4" />
                      </span>
                      {isHovered && (
                        <motion.span
                          initial={{ left: '-100%' }}
                          animate={{ left: '100%' }}
                          transition={{ duration: 1, ease: 'easeInOut' }}
                          className="absolute top-0 bottom-0 left-0 w-20 bg-gradient-to-r from-transparent via-white/30 to-transparent"
                          style={{ filter: 'blur(8px)' }}
                        />
                      )}
                    </Button>
                  </motion.div>

                  {/* Forgot Password Link */}
                  <div className="text-center mt-6">
                    <a href="#" className="text-blue-600 hover:text-blue-700 text-sm transition-colors">
                      Forgot password?
                    </a>
                  </div>
                </form>
              </motion.div>
            </div>
          </motion.div>
        </div>
      );
    }

    // ============================================================
    // Main Index Component
    // ============================================================

    function Index() {
      return (
        <div className="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <SignInCard />
        </div>
      );
    }

    // ============================================================
    // Render Application
    // ============================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Index />);
  </script>
</body>
</html>
